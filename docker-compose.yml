services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copago
      POSTGRES_USER: copago_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copago_user -d copago"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_in_prod}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://copago_user:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/copago
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_in_prod}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python:3.12-slim no trae curl — se usa urllib (stdlib)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  web:
    build: ./frontend
    environment:
      # Baked at build time — browsers reach the API through nginx on :8090 (dev)
      - NEXT_PUBLIC_API_URL=http://localhost:8090
      # Server-side (Next.js rewrites): internal Docker network — never exposed to browser
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:8080"   # dev (HTTP, no TLS) — acceso local: http://localhost:8090
      - "8081:80"     # HTTP → HTTPS redirect (producción)
      - "8443:443"    # HTTPS (producción, requiere certs en ./nginx/certs/)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pgdata:
