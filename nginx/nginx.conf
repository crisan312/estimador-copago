worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging (sin PII) ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $request_method $uri $server_protocol '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=6r/m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream api {
        server api:8000;
        keepalive 32;
    }

    upstream web {
        server web:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name copayai.ec www.copayai.ec;

        # TLS
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers (OWASP + LOPDP) ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

        # No cache for PII / API routes — LOPDP Art. 19
        location ~ ^/api/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── SSE streaming (chat + demo) — sin buffering ───────────────────────
        location ~ ^/api/v1/(chat|demo) {
            limit_req zone=chat_limit burst=3 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE: disable buffering
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;

            add_header Cache-Control "no-store" always;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Health (sin rate limit para monitoring) ───────────────────────────
        location = /api/v1/health {
            proxy_pass http://api;
            access_log off;
        }
    }

    # ── Dev / local: HTTP sin TLS (para docker-compose local) ────────────────
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        # ── Security headers (OWASP) — aplican a las páginas servidas por
        #    "location /". Las rutas /api/ los reciben del middleware FastAPI.
        add_header X-Frame-Options          "DENY" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        server_tokens off;

        location /api/ {
            add_header Cache-Control "no-store" always;
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/(chat|demo) {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            add_header Cache-Control "no-store" always;
        }

        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }
    }
}
